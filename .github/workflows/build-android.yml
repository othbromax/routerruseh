# ============================================================================
# Route Rush — Build Signed Android APK & AAB
# ============================================================================
# Triggered on every push.  Decodes a base64-encoded keystore from GitHub
# Secrets, signs the release build, uploads APK + AAB as workflow artifacts,
# then scrubs the keystore from the runner.
#
# Required GitHub Secrets (set in repo → Settings → Secrets → Actions):
#   KEYSTORE_BASE64      — The .jks keystore file encoded as base64
#   KEYSTORE_PASSWORD    — Password used when the keystore was created
#   KEY_ALIAS            — Alias of the key inside the keystore
#   KEY_PASSWORD         — Password for the key alias
# ============================================================================

name: Build Signed Android Release

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 8.x) ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter (stable channel) ──────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 4. Decode keystore from secret ───────────────────────────────────
      #    The keystore lives only in memory / temp file during the build.
      #    It is deleted in the cleanup step (runs even on failure).
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "Keystore decoded successfully ($(wc -c < android/app/upload-keystore.jks) bytes)"

      # ── 5. Create key.properties for Gradle ──────────────────────────────
      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "key.properties created"

      # ── 6. Install dependencies ──────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 7. Build signed APK (release) ────────────────────────────────────
      - name: Build APK
        run: flutter build apk --release

      # ── 8. Build signed AAB (release) ────────────────────────────────────
      - name: Build AAB
        run: flutter build appbundle --release

      # ── 9. Verify artifacts are release-signed (not debug) ───────────────
      - name: Verify signing
        run: |
          echo "=== APK signature ==="
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk | head -5
          echo ""
          echo "=== AAB signature ==="
          jarsigner -verify -verbose -certs build/app/outputs/bundle/release/app-release.aab | head -5

      # ── 10. Upload APK artifact ──────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: route-rush-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # ── 11. Upload AAB artifact ──────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: route-rush-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # ── 12. Cleanup — always runs, even on failure ───────────────────────
      - name: Cleanup keystore and credentials
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          echo "Keystore and key.properties removed"
