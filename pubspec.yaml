name: route_rush
description: "Route Rush – Asphalt & Agony: A high-octane racing game built with Flutter and Flame."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.36.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  flame_audio: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
